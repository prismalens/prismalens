[project]
name = "prismalens-worker"
version = "0.1.0"
description = "PrismaLens Python Worker - Google ADK Agent Execution"
readme = "README.md"
license = { text = "Elastic License 2.0" }
requires-python = ">=3.11"
dependencies = [
    # Google ADK for agent execution
    "google-adk>=1.0.0",
    "google-genai>=1.0.0",

    # Job queue (for queue mode)
    "bullmq>=0.8.0",
    "redis>=5.0.0",

    # HTTP server (for regular mode and health endpoints)
    "aiohttp>=3.9.0",

    # Prometheus metrics
    "prometheus-client>=0.20.0",

    # Configuration and validation
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",

    # Logging
    "structlog>=24.0.0",

    # HTTP client for external APIs
    "httpx>=0.27.0",
    "requests>=2.31.0",
    "litellm>=1.0.0",

    # Environment variables
    "python-dotenv>=1.0.0",

    # YAML parsing (for OpenAPI specs)
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-aiohttp>=1.0.0",
    "testcontainers[redis]>=4.0.0",
    "ruff>=0.8.0",
    "mypy>=1.10.0",
]

# Optional integrations
render = [
    "httpx>=0.27.0",
]

github = [
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
