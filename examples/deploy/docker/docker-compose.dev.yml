# PrismaLens Docker Compose - Development
# Usage: docker compose -f docker-compose.dev.yml up
# Access: http://localhost:5367
#
# Note: For active development, prefer running services separately:
#   Terminal 1: pnpm dev:frontend (http://localhost:3000)
#   Terminal 2: pnpm dev:api (http://localhost:3001)

services:
  # Caddy reverse proxy - unified entry point on port 5367
  caddy:
    image: caddy:2-alpine
    ports:
      - "5367:5367"
    volumes:
      - ./docker/caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - api
    networks:
      - prismalens

  # TanStack Start frontend (development mode)
  frontend:
    build:
      context: .
      dockerfile: docker/images/frontend/Dockerfile
      target: dev
    expose:
      - "3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - ./packages/frontend/src:/app/packages/frontend/src:ro
      - ./packages/frontend/public:/app/packages/frontend/public:ro
    networks:
      - prismalens

  # NestJS API backend (development mode)
  api:
    build:
      context: .
      dockerfile: docker/images/api/Dockerfile
      target: dev
    expose:
      - "3001"
    environment:
      - NODE_ENV=development
      - PRISMALENS_PORT=3001
      - PRISMALENS_HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL:-file:./prismalens.db}
    volumes:
      - ./packages/api/src:/app/packages/api/src:ro
    networks:
      - prismalens

networks:
  prismalens:
    driver: bridge
