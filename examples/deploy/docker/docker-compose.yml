# PrismaLens Docker Compose - Production (No SSL)
# Usage: docker compose up -d
# Access: http://localhost:5367

services:
  # Caddy reverse proxy - unified entry point on port 5367
  caddy:
    image: caddy:2-alpine
    ports:
      - "5367:5367"
    volumes:
      - ./docker/caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped
    networks:
      - prismalens

  # TanStack Start frontend (SSR)
  frontend:
    build:
      context: .
      dockerfile: docker/images/frontend/Dockerfile
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - prismalens

  # Redis — required for BullMQ job queue
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - prismalens
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # NestJS API backend
  api:
    build:
      context: .
      dockerfile: docker/images/api/Dockerfile
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PRISMALENS_PORT=3001
      - PRISMALENS_HOST=0.0.0.0
      - PRISMALENS_REDIS_HOST=redis
      - PRISMALENS_INTERNAL_SECRET=${PRISMALENS_INTERNAL_SECRET}
      - DATABASE_URL=${DATABASE_URL:-file:./prismalens.db}
    volumes:
      - prismalens_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - prismalens

  # BullMQ worker — processes investigation jobs
  worker:
    build:
      context: .
      dockerfile: docker/images/worker/Dockerfile
    environment:
      - NODE_ENV=production
      - PRISMALENS_REDIS_HOST=redis
      - PRISMALENS_WORKER_API_URL=http://api:3001/api
      - PRISMALENS_INTERNAL_SECRET=${PRISMALENS_INTERNAL_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - prismalens

networks:
  prismalens:
    driver: bridge

volumes:
  prismalens_data:
  redis_data:
