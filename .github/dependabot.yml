version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Group only low-risk minor/patch bumps so they can be reviewed and merged
      # in bulk. Majors are deliberately excluded here, so Dependabot opens them
      # individually — one reviewable PR per potentially-breaking change instead
      # of a single grouped PR that hides majors among dozens of safe bumps.
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"
