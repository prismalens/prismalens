# Build / typecheck / test / lint for every PR and every push to a trunk.
#
# This is a pnpm + Turborepo monorepo (NestJS API + TanStack Start UI + a BullMQ
# worker + shared @prismalens/* packages). The jobs mirror the commands a
# contributor runs locally (see CONTRIBUTING.md).
#
# Task ordering (Prisma generate -> config build -> package builds -> typecheck)
# is encoded in turbo.json via `dependsOn`, so `pnpm build`, `pnpm typecheck`,
# and `pnpm test` each self-order from a clean checkout — no manual prerequisite
# steps needed here. Lint (Biome) only reads source, so it needs neither.
#
# All three jobs are wired as REQUIRED status checks in .github/governance.json.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      # Manifest/exports sanity for the packages that publish to npm (R0.c).
      - name: publint (publishable packages)
        run: pnpm publint

  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # engines.node is >=22 (work-005 decision 5) — prove it, and prove the
      # suite is not ubuntu-only, before the first npm release.
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  # Packed-artifact smoke (work-005 R0.d): pack the single published tarball
  # (prismalens — the @prismalens/* closure is bundled into it, issue #193) and
  # prove it installs + runs in a clean container — no pnpm, no monorepo, no
  # devDeps. Catches missing `files`, undeclared deps, bin/shebang wiring, ESM
  # layout, and engines bugs that monorepo-resident tests structurally cannot.
  pack:
    name: Pack npm tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build closure
        run: pnpm --filter prismalens... build

      - name: Pack tarball
        run: |
          mkdir -p /tmp/tarballs
          (cd packages/cli && pnpm pack --out /tmp/tarballs/%s-%v.tgz)
          ls -l /tmp/tarballs

      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarballs
          path: /tmp/tarballs/*.tgz
          retention-days: 3

  packed-smoke:
    name: Packed smoke (${{ matrix.image }})
    needs: pack
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ["node:22-slim", "node:24-slim"]
    container: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: scripts/packed-smoke.sh
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          name: npm-tarballs
          path: tarballs

      - name: Smoke the packed tarball
        run: sh scripts/packed-smoke.sh tarballs

  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Biome reads source only — no build or Prisma generate required.
      - name: Biome check (format + lint)
        run: pnpm format-and-lint

      # SPDX headers on first-party source; policy in CONTRIBUTING.md.
      - name: SPDX header check
        run: pnpm spdx:check
