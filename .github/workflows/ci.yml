# Build / typecheck / test / lint for every PR and every push to a trunk.
#
# This is a pnpm + Turborepo monorepo (NestJS API + TanStack Start UI + a BullMQ
# worker + shared @prismalens/* packages). The jobs mirror the commands a
# contributor runs locally (see CONTRIBUTING.md).
#
# Task ordering (Prisma generate -> config build -> package builds -> typecheck)
# is encoded in turbo.json via `dependsOn`, so `pnpm build`, `pnpm typecheck`,
# and `pnpm test` each self-order from a clean checkout — no manual prerequisite
# steps needed here. Lint (Biome) only reads source, so it needs neither.
#
# All three jobs are wired as REQUIRED status checks in .github/governance.json.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      # Manifest/exports sanity for the packages that publish to npm (R0.c).
      - name: publint (publishable packages)
        run: pnpm publint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Biome reads source only — no build or Prisma generate required.
      - name: Biome check (format + lint)
        run: pnpm format-and-lint

      # SPDX headers on first-party source; policy in CONTRIBUTING.md.
      - name: SPDX header check
        run: pnpm spdx:check
