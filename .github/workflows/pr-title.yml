# Enforce that PR titles follow Conventional Commits. The repo squash-merges, so a
# PR's title becomes the commit subject on the trunk (`first`). Keeping titles
# conventional keeps history readable and changelog-ready.
#
# This validates the PR TITLE, not local branch commits (those get squashed away) —
# which is why a commit-msg hook (husky/commitlint) would be the wrong layer for a
# branch-protected, squash-merge repo.
#
# This is wired as a REQUIRED status check via the repository ruleset (see
# .github/governance.json and scripts/repo/sync-repo-governance.sh) so a non-conventional
# title blocks merge. `synchronize` is included because a required check must run on
# each new push to stay green.
name: Lint PR title

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title (conventional commits)
    runs-on: ubuntu-latest
    steps:
      # No `with:` config — defaults validate against the standard conventional-commit
      # types (feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert).
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
