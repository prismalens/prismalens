# Dependency vulnerability audit.
#
# Runs weekly (and on demand) rather than on every PR: newly-disclosed advisories
# should surface as a visible signal, but must not spontaneously turn unrelated
# PRs red. Fails only on high/critical so the alert means "act now". Dependabot
# continues to open the actual fix PRs.
name: Audit

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (fail on high or critical)
        run: pnpm audit --audit-level=high
