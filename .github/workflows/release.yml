# Release via changesets (work-005 R0.c).
#
# On every push to main: if unreleased .changeset/*.md files exist, the action
# opens/updates a "Version Packages" PR (runs `pnpm changeset:version`). When
# that PR merges, the action publishes the single published package —
# `prismalens`, the CLI, which bundles the first-party @prismalens/* closure
# into its tarball (issue #193; the scoped packages are private:true and never
# published) — via `pnpm changeset:publish` = `pnpm publish -r` (skips private
# packages) + `changeset tag`, and creates one GitHub Release for its tag.
#
# Publishing authenticates via npm TRUSTED PUBLISHING (OIDC): id-token:write
# lets pnpm (>=10.13; this repo pins 10.27) exchange the runner's OIDC token
# for a short-lived npm credential — no npm token secret exists or is needed.
# The prismalens package has this repo + workflow registered as a trusted
# publisher on npmjs.com, and provenance attestations are generated
# automatically. Requirement: the publishing package must already exist on
# npm (bootstrap 0.0.1 was published manually by the maintainer).
#
# The Version-Packages PR is created with the RELEASE_PAT repo secret (a
# fine-grained PAT: this repo, Contents + Pull requests read/write), NOT the
# default GITHUB_TOKEN, for two reasons: this repo forbids Actions from
# creating PRs, and PRs pushed/opened with GITHUB_TOKEN never trigger CI
# (GitHub anti-recursion) — the required checks would never report and the
# version PR could not merge.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # PAT so the changeset-release branch push comes from a user, not
          # github-actions — see the RELEASE_PAT note in the header.
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: publint (publishable packages)
        run: pnpm publint

      - name: Version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
