# Release via changesets (work-005 R0.c).
#
# On every push to main: if unreleased .changeset/*.md files exist, the action
# opens/updates a "Version Packages" PR (runs `pnpm changeset:version`). When
# that PR merges, the action publishes every package whose version is not yet
# on npm (runs `pnpm changeset:publish` = `pnpm publish -r` + `changeset tag`;
# pnpm rewrites workspace:* ranges to real versions at pack time) and creates
# a GitHub Release per tag.
#
# Publishing authenticates via npm TRUSTED PUBLISHING (OIDC): id-token:write
# lets pnpm (>=10.13; this repo pins 10.27) exchange the runner's OIDC token
# for a short-lived npm credential — no npm token secret exists or is needed.
# Each of the 4 packages has this repo + workflow registered as a trusted
# publisher on npmjs.com, and provenance attestations are generated
# automatically. Requirement: the publishing package must already exist on
# npm (bootstrap 0.0.1 was published manually by the maintainer).
#
# The Version-Packages PR is created with the RELEASE_PAT repo secret (a
# fine-grained PAT: this repo, Contents + Pull requests read/write), NOT the
# default GITHUB_TOKEN, for two reasons: this repo forbids Actions from
# creating PRs, and PRs pushed/opened with GITHUB_TOKEN never trigger CI
# (GitHub anti-recursion) — the required checks would never report and the
# version PR could not merge.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # PAT so the changeset-release branch push comes from a user, not
          # github-actions — see the RELEASE_PAT note in the header.
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: publint (publishable packages)
        run: pnpm publint

      - name: Version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          # CI publishes through a pinned one-off pnpm 11 (`changeset:publish:ci`):
          # the repo pins pnpm 10 (packageManager), but pnpm 10's RECURSIVE publish
          # never attempts the OIDC exchange — the first 0.0.2 run died ENEEDAUTH
          # (run 28885480320). pnpm 11 attempts trusted publishing per package on
          # `publish -r` (v11.0.7) and tolerates setup-node's npmrc placeholder
          # (v11.1.3). Publish only packs manifests, so the pnpm-10 lockfile is
          # untouched. NPM_CONFIG_PROVENANCE stays explicit: npm's "automatic with
          # trusted publishing" claim is unreliable in practice (npm/cli#8730).
          publish: pnpm changeset:publish:ci
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
          NPM_CONFIG_PROVENANCE: "true"
