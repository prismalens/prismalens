# Release via changesets (work-005 R0.c).
#
# On every push to main: if unreleased .changeset/*.md files exist, the action
# opens/updates a "Version Packages" PR (runs `pnpm changeset:version`). When
# that PR merges, the action publishes every package whose version is not yet
# on npm (runs `pnpm changeset:publish` = `pnpm publish -r` + `changeset tag`;
# pnpm rewrites workspace:* ranges to real versions at pack time) and creates
# a GitHub Release per tag.
#
# Publishing authenticates with the NPM_TOKEN repo secret (granular automation
# token). id-token:write enables npm provenance attestations; move to npm
# trusted publishing (OIDC, no long-lived token) once the packages exist.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: publint (publishable packages)
        run: pnpm publint

      - name: Version PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
