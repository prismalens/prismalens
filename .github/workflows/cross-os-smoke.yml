# Cross-OS from-scratch CLI smoke: proves the published `prismalens` npm
# package installs and runs correctly on Linux, macOS, AND Windows.
#
# This is phase-gate testing PART 2 (the milestone gate's "smoke-test the
# RELEASED artifact" requirement — see .github/workflows/phase-gate.yml) —
# NOT sreforge. sreforge is the separate clean-env engine/eval capabilities
# testing ground; this workflow only proves the packaged CLI artifact.
#
# Two modes, chosen by the `mode` job from the triggering event:
#   - tarball  (pull_request touching packages/** or this workflow, and push
#     to main): build + `pnpm pack`, cold-install the tarballs into a clean
#     dir, drive the installed bin. Fast feedback on every PR.
#   - registry (workflow_dispatch, and `release: published` for the
#     unscoped `prismalens` package tag): `npm install prismalens@<version>`
#     from the real npm registry into a clean dir, drive the installed bin.
#     This IS the gate's released-artifact verification — trigger this
#     workflow with `version` set to the just-released version (or let a
#     `prismalens@<version>` GitHub Release trigger it automatically) and
#     link the green 3-OS run in the phase-gate issue.
#
# Assertions share their core with scripts/packed-smoke.sh (which only
# proves the tarballs are well-formed, on Linux containers, as part of the
# `ci.yml` pack/packed-smoke jobs) via scripts/cross-os-smoke.sh, which adds
# `status`, unknown-flag handling, and a `serve` JSON-RPC round-trip.
name: Cross-OS CLI smoke

on:
  pull_request:
    paths:
      - "packages/**"
      - ".github/workflows/cross-os-smoke.yml"
      - "scripts/cross-os-smoke.sh"
  push:
    branches: [main]
    paths:
      - "packages/**"
      - ".github/workflows/cross-os-smoke.yml"
      - "scripts/cross-os-smoke.sh"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "prismalens version to install from the npm registry (default: latest)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: cross-os-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mode:
    name: Resolve mode
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.resolve.outputs.mode }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve mode + version from the triggering event
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          case "$EVENT_NAME" in
          release)
            # `prismalens` is the only published package, so `prismalens@X.Y.Z`
            # is the only release tag that maps to a verifiable npm artifact
            # (the @prismalens/* closure is private + bundled, #193 — it never
            # gets its own release tag). Guard anyway: skip any other tag.
            case "$RELEASE_TAG" in
            prismalens@*)
              echo "mode=registry" >> "$GITHUB_OUTPUT"
              echo "version=${RELEASE_TAG#prismalens@}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              echo "version=" >> "$GITHUB_OUTPUT"
              ;;
            esac
            ;;
          workflow_dispatch)
            echo "mode=registry" >> "$GITHUB_OUTPUT"
            echo "version=${DISPATCH_VERSION:-latest}" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "mode=tarball" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            ;;
          esac

  pack:
    name: Pack prismalens tarball (tarball mode)
    needs: mode
    if: needs.mode.outputs.mode == 'tarball'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build closure
        run: pnpm --filter prismalens... build

      - name: Pack tarball
        run: |
          mkdir -p /tmp/tarballs
          (cd packages/cli && pnpm pack --out /tmp/tarballs/%s-%v.tgz)
          ls -l /tmp/tarballs

      - uses: actions/upload-artifact@v7
        with:
          name: npm-tarballs-cross-os-smoke
          path: /tmp/tarballs/*.tgz
          retention-days: 3

  smoke:
    name: Smoke (${{ matrix.os }})
    needs: [mode, pack]
    # `pack` is skipped (not failed) in registry mode — only block on an
    # actual pack failure/cancellation, never on registry-mode's skip.
    if: |
      always() &&
      needs.mode.outputs.mode != 'skip' &&
      needs.pack.result != 'failure' &&
      needs.pack.result != 'cancelled'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        # Windows runners default `run:` to pwsh — force git-bash everywhere
        # so scripts/cross-os-smoke.sh runs unmodified on all 3 OSes.
        shell: bash
    env:
      MODE: ${{ needs.mode.outputs.mode }}
      VERSION: ${{ needs.mode.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: |
            scripts/cross-os-smoke.sh
            .nvmrc
          sparse-checkout-cone-mode: false

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Download tarballs
        if: env.MODE == 'tarball'
        uses: actions/download-artifact@v8
        with:
          name: npm-tarballs-cross-os-smoke
          path: tarballs

      - name: Cold-install the prismalens tarball into a clean dir (tarball mode)
        if: env.MODE == 'tarball'
        run: |
          mkdir -p scratch
          cd scratch

          # Relative (forward-slash) paths only — an absolute path minted by
          # mktemp/pwd on Windows git-bash is a POSIX-style MSYS path that
          # native npm.exe/node.exe cannot resolve back to the same real
          # directory. Relative "file:../tarballs/x.tgz" has no such
          # ambiguity and resolves identically on all 3 OSes.
          find_tarball() {
            for f in ../tarballs/$1[0-9]*.tgz; do
              [ -e "$f" ] || { echo "no tarball matching $1*.tgz" >&2; exit 1; }
              echo "$f"
              return
            done
          }
          CLI_TGZ=$(find_tarball "prismalens-")

          # prismalens is self-contained — the @prismalens/* closure is bundled
          # into its tarball at build time (#193), so a single dependency is the
          # entire install. No overrides for the (now private, unpublished)
          # scoped packages; if they leaked back into the tree, the ci.yml
          # packed-smoke assertion would catch it.
          cat > package.json <<EOF
          {
            "name": "cross-os-smoke-scratch",
            "private": true,
            "dependencies": { "prismalens": "file:$CLI_TGZ" }
          }
          EOF

          npm install --engine-strict --no-audit --no-fund --loglevel=error

      - name: Cold-install from the npm registry into a clean dir (registry mode)
        if: env.MODE == 'registry'
        run: |
          mkdir -p scratch
          cd scratch
          npm init -y >/dev/null
          npm install --engine-strict --no-audit --no-fund --loglevel=error "prismalens@${VERSION}"

      - name: Run the cross-OS smoke assertions
        run: bash scripts/cross-os-smoke.sh scratch
