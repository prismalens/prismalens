name: Agent Tests

on:
  push:
    branches: [main, first]
    paths:
      - 'packages/@prismalens/agents/**'
      - '.github/workflows/agent-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/@prismalens/agents/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Unit and Integration Tests - Run on every push/PR
  unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter @prismalens/agents... build

      - name: Run unit tests
        run: pnpm --filter @prismalens/agents test:unit
        env:
          NODE_ENV: test

      - name: Run integration tests
        run: pnpm --filter @prismalens/agents test:integration
        env:
          NODE_ENV: test

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: packages/@prismalens/agents/coverage/coverage-final.json
          flags: agents-unit
          fail_ci_if_error: false

  # E2E Evaluation Tests - Run on main branch only
  e2e-evaluation:
    name: E2E Evaluation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter @prismalens/agents... build

      - name: Run E2E evaluation tests
        run: pnpm --filter @prismalens/agents test:e2e
        env:
          NODE_ENV: test
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING: 'true'
          LANGCHAIN_TRACING_V2: 'true'
          LANGCHAIN_PROJECT: 'prismalens-agents-ci'
          # Use mock LLM for CI
          DISABLE_REAL_LLM: 'true'

  # Type checking - Separate job for visibility
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm --filter @prismalens/agents... build

      - name: Run type check
        run: pnpm --filter @prismalens/agents typecheck

  # Lint - Separate job for visibility
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm --filter @prismalens/agents lint

  # Summary job that requires all other jobs
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-integration, typecheck, lint]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.unit-integration.result }}" != "success" ]; then
            echo "Unit/Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "Type check failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint failed"
            exit 1
          fi
          echo "All tests passed!"
