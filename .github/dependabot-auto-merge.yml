# Auto-merge Dependabot PRs once all required status checks pass.
#
# Uses only the built-in GITHUB_TOKEN — no secret, no API key, nothing that
# depends on a laptop being on. Runs entirely on GitHub's hosted runners.
#
# Policy:
#   * npm patch + minor    -> auto-merge. These arrive as the grouped
#     dev-minor-patch / prod-minor-patch PRs; majors are excluded from those
#     groups in dependabot.yml and open individually, so they are NOT matched
#     here and wait for a human.
#   * github-actions bumps -> auto-merge (low risk, usually a pinned-tag move).
#
# `gh pr merge --auto` only QUEUES the merge; GitHub completes it after every
# required check on the base branch is green. Prerequisites (one-time, per repo):
#   - "Allow auto-merge" enabled in Settings -> General -> Pull Requests
#   - required approvals = 0 on main (the CI gate is the guard, not a human)
name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Queue auto-merge for safe updates
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.package-ecosystem == 'github_actions'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
