name: Feature request
description: Suggest an idea or improvement for prismalens.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point, not just the solution.
      placeholder: When investigating an incident I ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like prismalens to do. Sketches and example flows welcome.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or tools you have tried or thought about.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Fit
      description: prismalens is a local-first, human-initiated SRE investigation tool that reaches systems through the user's own CLIs under read-only credentials.
      options:
        - label: This fits prismalens's scope (local-first, evidence-linked incident investigation).
          required: false
  - type: textarea
    id: docs-impact
    attributes:
      label: Docs impact
      description: Which doc surfaces will this touch (specific files/sections)? 'none' must be justified.
    validations:
      required: true
