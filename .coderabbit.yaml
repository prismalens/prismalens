# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
reviews:
  profile: chill
  path_instructions:
    - path: "packages/cli/src/**"
      instructions: >-
        This is the published `prismalens` CLI package. If this PR changes a CLI verb, flag, env var, config key, task name, file layout, prompt surface, canonical event, or operator workflow, it must also update the RELEVANT documentation surface that describes that behavior — an unrelated docs/ or README change does not satisfy this. If the relevant surface is not updated, flag it as a documentation gap and name the specific stale surface. Reference surfaces: `packages/cli/README.md`, `packages/api/README.md`, `packages/@prismalens/contracts/README.md`, `docs/`.
    - path: "packages/@prismalens/engine/src/**"
      instructions: >-
        This is the published `@prismalens/engine` package. If this PR changes a CLI verb, flag, env var, config key, task name, file layout, prompt surface, canonical event, or operator workflow, it must also update the RELEVANT documentation surface that describes that behavior — an unrelated docs/ or README change does not satisfy this. If the relevant surface is not updated, flag it as a documentation gap and name the specific stale surface. Reference surfaces: `packages/cli/README.md`, `packages/api/README.md`, `packages/@prismalens/contracts/README.md`, `docs/`. Repo invariants: the engine is agent/harness-agnostic (no harness-specific logic outside the harness registry); the engine takes a host-assembled InvestigationContext (it never fetches its own inputs); ordered-evidence epistemics — no numeric confidence scores anywhere in contracts or UI copy; the engine is a library — no protocol/transport/concurrency assumptions in engine core.
